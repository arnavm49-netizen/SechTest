services:
  postgres:
    image: postgres:15
    container_name: enterprise-psychometric-postgres
    environment:
      POSTGRES_DB: psychometrics
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - psychometric-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: enterprise-psychometric-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - psychometric-redis-data:/data

volumes:
  psychometric-postgres-data:
  psychometric-redis-data:
