services:
  - type: web
    name: sechtest-psychometric-system
    runtime: node
    plan: free
    region: singapore
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run db:deploy && npm start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: AUTH_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
